<style>
  html,body{margin:0;background:#121215;min-height:100%;}
  #boot{position:fixed;inset:0;display:grid;place-items:center;color:#a1a1aa;
    font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;z-index:9999;background:#121215;}
  #boot.hide{display:none;}
  #toolbar{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:10px;
    padding:8px 16px;background:rgba(22,22,25,.88);backdrop-filter:blur(10px);
    border-bottom:1px solid #27272a;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;}
  #toolbar .sp{flex:1;}
  #toolbar #status{font-size:12px;color:#4ade80;transition:opacity .4s;opacity:0;}
  #toolbar button{font:inherit;font-size:12px;font-weight:600;color:#fafafa;cursor:pointer;
    background:#27272a;border:1px solid #3f3f46;border-radius:9px;padding:6px 12px;transition:background .15s;}
  #toolbar button:hover{background:#3f3f46;}
  #toolbar .brand{font-size:14px;font-weight:800;letter-spacing:-.2px;color:#facc15;}
  #app-root{padding-top:46px;}
  input#file{display:none;}
  #toolbar .theme-btn{width:30px;height:30px;padding:0;font-size:15px;line-height:1;display:inline-grid;place-items:center;}
  #toolbar .theme-btn.on{border-color:#facc15;color:#facc15;}
  /* o logo mora no menu lateral no desktop; na barra só aparece em telas estreitas */
  @media (min-width:1025px){ #toolbar .brand{display:none;} }
  /* ---- tema claro ---- */
  html[data-theme="light"],html[data-theme="light"] body{background:#fafafa;}
  html[data-theme="light"] #boot{background:#fafafa;color:#71717a;}
  html[data-theme="light"] #toolbar{background:rgba(255,255,255,.88);border-bottom-color:#e4e4e7;}
  html[data-theme="light"] #toolbar button{color:#18181b;background:#ffffff;border-color:#d4d4d8;}
  html[data-theme="light"] #toolbar button:hover{background:#f4f4f5;}
  html[data-theme="light"] #toolbar .brand{color:#ca8a04;}
  html[data-theme="light"] #toolbar .theme-btn.on{border-color:#ca8a04;color:#ca8a04;}
  html[data-theme="light"] #toolbar #status{color:#15803d;}
  #restoreModal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);
    align-items:flex-start;justify-content:center;padding:70px 16px;font-family:-apple-system,'Segoe UI',sans-serif;}
  #restoreModal.on{display:flex;}
  .rm-card{background:#18181b;color:#fafafa;border:1px solid #27272a;border-radius:16px;
    width:460px;max-width:100%;max-height:80vh;overflow:auto;padding:18px 20px;box-shadow:0 20px 50px rgba(0,0,0,.5);}
  html[data-theme="light"] .rm-card{background:#fff;color:#15161a;border-color:#e9e9ee;}
  .rm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:15px;}
  .rm-head button{border:none;background:transparent;color:inherit;font-size:22px;cursor:pointer;line-height:1;}
  .rm-sub{font-size:12.5px;color:#a1a1aa;margin:0 0 14px;line-height:1.5;}
  .rm-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border-radius:10px;
    border:1px solid #27272a;margin-bottom:8px;font-size:13px;}
  html[data-theme="light"] .rm-item{border-color:#e4e4e7;}
  .rm-item .rm-when{font-weight:600;}
  .rm-item .rm-meta{font-size:11px;color:#a1a1aa;}
  .rm-item button{font:inherit;font-size:12px;font-weight:700;cursor:pointer;background:#facc15;color:#1a1206;
    border:none;border-radius:8px;padding:7px 13px;}
  html[data-theme="light"] .rm-item button{background:#ca8a04;color:#ffffff;}
  .rm-empty{font-size:13px;color:#a1a1aa;font-style:italic;}
</style>
</head>
<body>
<div id="boot">carregando o painel...</div>

<div id="toolbar">
  <span class="brand">&#9878; MagisNAD</span>
  <span id="status">salvo &#10003;</span>
  <span class="sp"></span>
  <button id="btnLight" class="theme-btn" title="Tema claro">&#9728;</button>
  <button id="btnDark" class="theme-btn" title="Tema escuro">&#9789;</button>
  <button id="btnRestore" title="Restaurar uma versão anterior salva automaticamente">&#8635; Restaurar</button>
  <button id="btnExport" title="Baixar um backup .json com todo o seu progresso">Exportar backup</button>
  <button id="btnImport" title="Restaurar/mesclar um backup em outro aparelho ou navegador">Importar</button>
  <input id="file" type="file" accept="application/json,.json" />
</div>

<div id="restoreModal">
  <div class="rm-card">
    <div class="rm-head">
      <b>Restaurar versão anterior</b>
      <button id="rmClose" title="Fechar">&times;</button>
    </div>
    <p class="rm-sub">O app salva uma "foto" do seu progresso automaticamente. Escolha uma versão para voltar (o estado atual é salvo antes, por segurança).</p>
    <div id="rmList"></div>
  </div>
</div>

<div id="app-root"><div id="root"></div></div>

<!-- PONTE: dá ao componente um window.storage real, gravando no localStorage do navegador -->
<script>
// aplica o tema salvo o quanto antes (evita "flash")
(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('magisnad-theme') || 'dark'); })();
window.storage = {
  get: function(k){ var v = localStorage.getItem(k); return Promise.resolve(v == null ? null : { value: v }); },
  set: function(k, v){ localStorage.setItem(k, v); return Promise.resolve(); }
};
// indicador visual "salvo ✓" a cada gravação
(function(){
  var orig = Storage.prototype.setItem;
  Storage.prototype.setItem = function(k, v){
    orig.apply(this, arguments);
    if (String(k).indexOf('tjsc-') === 0) {
      var s = document.getElementById('status');
      if (s){ s.style.opacity = 1; clearTimeout(window.__st); window.__st = setTimeout(function(){ s.style.opacity = 0; }, 1200); }
    }
  };
})();
</script>

<script src="editais.js"></script>
<script type="text/babel" data-presets="react">
__COMPONENT__

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
document.getElementById('boot').classList.add('hide');
</script>

<script>
// ---- Backup automático (snapshots) + Restaurar ----
function isProgress(k){ return k && k.indexOf('tjsc-') === 0 && k.indexOf('tjsc-snapshot:') !== 0; }
function progressKeys(){ var a=[]; for (var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(isProgress(k)) a.push(k); } return a; }
function snapshotKeys(){ var a=[]; for (var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k && k.indexOf('tjsc-snapshot:')===0) a.push(k); } return a.sort(); }
function collectProgress(){ var o={}; progressKeys().forEach(function(k){ o[k]=localStorage.getItem(k); }); return o; }
function trimSnaps(max){ var s=snapshotKeys(); while(s.length>max){ localStorage.removeItem(s.shift()); } }
function makeSnapshot(force){
  var data = collectProgress();
  if (Object.keys(data).length === 0) return;
  if (!force){
    var s = snapshotKeys(); var last = s[s.length-1];
    if (last){ var t = Date.parse(last.slice('tjsc-snapshot:'.length)); if (Date.now() - t < 12*3600*1000) return; }
  }
  try { localStorage.setItem('tjsc-snapshot:' + new Date().toISOString(), JSON.stringify(data)); } catch(e){}
  trimSnaps(10);
}
makeSnapshot(false);

function fmtWhen(iso){ try { var d=new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); } catch(e){ return iso; } }
function openRestore(){
  var list = document.getElementById('rmList');
  var snaps = snapshotKeys().slice().reverse();
  if (!snaps.length){ list.innerHTML = '<div class="rm-empty">Ainda não há versões salvas. Elas começam a ser guardadas conforme você usa o app.</div>'; }
  else {
    list.innerHTML = '';
    snaps.forEach(function(k){
      var iso = k.slice('tjsc-snapshot:'.length);
      var n = 0; try { n = Object.keys(JSON.parse(localStorage.getItem(k))).length; } catch(e){}
      var row = document.createElement('div'); row.className='rm-item';
      row.innerHTML = '<div><div class="rm-when">'+fmtWhen(iso)+'</div><div class="rm-meta">'+n+' registros</div></div>';
      var b = document.createElement('button'); b.textContent='Restaurar'; b.onclick=function(){ doRestore(k); };
      row.appendChild(b); list.appendChild(row);
    });
  }
  document.getElementById('restoreModal').classList.add('on');
}
function doRestore(key){
  if (!confirm('Restaurar esta versão? O seu estado atual será substituído — mas é salvo antes, então dá pra voltar.')) return;
  makeSnapshot(true);
  var data; try { data = JSON.parse(localStorage.getItem(key)); } catch(e){ alert('Versão inválida.'); return; }
  progressKeys().forEach(function(k){ localStorage.removeItem(k); });
  Object.keys(data).forEach(function(k){ localStorage.setItem(k, data[k]); });
  location.reload();
}
document.getElementById('btnRestore').onclick = openRestore;
document.getElementById('rmClose').onclick = function(){ document.getElementById('restoreModal').classList.remove('on'); };
document.getElementById('restoreModal').onclick = function(e){ if (e.target === this) this.classList.remove('on'); };

// Exportar / Importar backup (progresso; snapshots ficam de fora)
function collect(){ return collectProgress(); }
document.getElementById('btnExport').onclick = function(){
  var data = { _app: 'matriz-tjsc', _exportadoEm: new Date().toISOString(), dados: collect() };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'matriz-tjsc-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
// alternância de tema (sol/lua)
function syncThemeBtns(){
  var t = document.documentElement.getAttribute('data-theme');
  document.getElementById('btnLight').classList.toggle('on', t === 'light');
  document.getElementById('btnDark').classList.toggle('on', t !== 'light');
}
function setTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('magisnad-theme', t); syncThemeBtns(); }
document.getElementById('btnLight').onclick = function(){ setTheme('light'); };
document.getElementById('btnDark').onclick = function(){ setTheme('dark'); };
syncThemeBtns();

document.getElementById('btnImport').onclick = function(){ document.getElementById('file').click(); };
document.getElementById('file').onchange = function(e){
  var f = e.target.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function(){
    try {
      var parsed = JSON.parse(r.result);
      var dados = parsed.dados || parsed;
      var n = 0;
      Object.keys(dados).forEach(function(k){
        if (k.indexOf('tjsc-') === 0) { localStorage.setItem(k, dados[k]); n++; }
      });
      alert('Backup importado: ' + n + ' registros restaurados. A pagina vai recarregar.');
      location.reload();
    } catch (err) {
      alert('Arquivo invalido. Selecione um backup .json exportado por este painel.');
    }
  };
  r.readAsText(f);
};
</script>
</body>
</html>
